name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build and Upload Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          persist-credentials: false

      - name: Checkout repository
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 #v2.9.1

      - name: Run build
        run: make build

      - name: Upload release artifacts
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda #v3.0.0
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append Rust version to release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          RUST_VERSION=$(grep -oP '^FROM rust:\K[\d.]+' Dockerfile)

          RELEASE_NOTES=$(gh release view "${TAG_NAME}" --json body --jq '.body')

          echo -e "${RELEASE_NOTES}\n\n*Binary in the release is compiled with Rust ${RUST_VERSION}*" > release-notes.md

          gh release edit "${TAG_NAME}" --notes-file release-notes.md
